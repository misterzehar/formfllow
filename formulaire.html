  else if(q.type==='ranking'){const opts=Array.isArray(a[q.id])?a[q.id]:[...(q.options||[])];if(!Array.isArray(a[q.id]))a[q.id]=opts;f='<div class="rank">'+opts.map((o,i)=>'<div class="ri" draggable="true" ondragstart="rd='+i+'" ondragover="event.preventDefault()" ondrop="rdp(event,'+i+','+q.id+')"><span class="rn">'+(i+1)+'</span><span class="rl">'+esc2(o)+'</span><div style="display:flex;flex-direction:column;gap:2px;margin-left:auto">'+(i>0?'<button onclick="rmv('+q.id+','+i+',-1)" style="background:var(--b2);border:none;color:var(--t1);border-radius:5px;width:28px;height:24px;cursor:pointer;font-size:13px">▲</button>':'<span style="width:28px;height:24px"></span>')+(i<opts.length-1?'<button onclick="rmv('+q.id+','+i+',1)" style="background:var(--b2);border:none;color:var(--t1);border-radius:5px;width:28px;height:24px;cursor:pointer;font-size:13px">▼</button>':'<span style="width:28px;height:24px"></span>')+'</div></div>').join('')+'</div>';}
  else if(q.type==='weekdays'){const sel=Array.isArray(v)?v:[];f='<div class="wdays">'+DY.map((d,i)=>'<div class="wday'+(sel.includes(i)?' on':'')+'" onclick="td('+q.id+','+i+')">'+d.s+'</div>').join('')+'</div>';}
  else if(q.type==='budget'){const ba=v||{};f='<div class="bmat">'+(q.categories||[]).map(c=>'<div class="brow"><div class="blbl">'+esc2(c.label)+'</div><div class="blvls">'+c.levels.map(l=>'<div class="blvl'+(ba[c.label]===l.label?' on':'')+'" onclick="tb('+q.id+','+JSON.stringify(c.label).replace(/"/g,'&quot;')+','+JSON.stringify(l.label).replace(/"/g,'&quot;')+')"><div class="bn">'+esc2(l.label)+'</div><div class="bs">'+esc2(l.sub)+'</div></div>').join('')+'</div></div>').join('')+'</div>';}
  else if(q.type==='media'){const mo=(v&&v.mode)||'text';f='<div class="mtabs"><button class="mtab'+(mo==='text'?' on':'')+'" onclick="mm('+q.id+',\'text\')">✏️ Texte</button><button class="mtab'+(mo==='link'?' on':'')+'" onclick="mm('+q.id+',\'link\')">🔗 Lien</button></div>'+(mo==='text'?'<textarea class="ta" oninput="mv('+q.id+',\'text\',this.value)">'+(v&&v.text?esc2(v.text):'')+'</textarea>':'<input class="inp" type="url" value="'+(v&&v.link?esc2(v.link):'')+'" placeholder="https://…" oninput="mv('+q.id+',\'link\',this.value)"/>');}
  st.innerHTML='<div class="qnum">'+(s+1)+' / '+tot+'</div><div class="qt">'+esc2(q.title)+(q.required?' <span style="color:var(--acc)">*</span>':'')+'</div>'+(q.desc?'<div class="qd">'+esc2(q.desc)+'</div>':'')+f+'<div class="perr" id="pe"></div><div class="nav">'+(s>0?'<button class="nb" onclick="s--;r()">← Précédent</button>':'<span></span>')+'<button class="nn" onclick="nx()">'+(s===tot-1?'Terminer ✓':'Suivant →')+'</button></div>';
}
function nx(){const q=Q[s];if(q.required&&!ha(q)){const e=document.getElementById('pe');if(e)e.textContent='Réponse obligatoire.';return;}s++;if(s>=Q.length&&GS_URL){fetch(GS_URL,{method:'POST',body:JSON.stringify({answers:a,questions:Q}),headers:{'Content-Type':'text/plain'}}).catch(()=>{});}r();}
function ha(q){const v=a[q.id];if(v===undefined||v===null||v==='')return false;if(typeof v==='boolean')return true;if(Array.isArray(v))return v.length>0;if(q.type==='budget')return Object.keys(v).length>0;if(q.type==='media')return !!(v.text||v.link);return true;}
function pa(id,v){a[id]=v;r();}
function tc(id,v){const c=Array.isArray(a[id])?[...a[id]]:[];const i=c.indexOf(v);if(i>=0)c.splice(i,1);else c.push(v);a[id]=c;r();}
function td(id,i){const c=Array.isArray(a[id])?[...a[id]]:[];const idx=c.indexOf(i);if(idx>=0)c.splice(idx,1);else c.push(i);c.sort();a[id]=c;r();}
function te(id,e){const c=Array.isArray(a[id])?[...a[id]]:[];const i=c.indexOf(e);if(i>=0)c.splice(i,1);else c.push(e);a[id]=c;r();}
function tb(id,cat,lvl){if(!a[id])a[id]={};a[id][cat]=lvl;r();}
function mm(id,m){if(!a[id])a[id]={};a[id].mode=m;r();}
function mv(id,k,v){if(!a[id])a[id]={mode:'text'};a[id][k]=v;}
function nc(id,d,mn,mx){const cur=a[id]!==undefined?a[id]:(Q.find(x=>x.id===id)?.def??mn);const nv=Math.max(mn,Math.min(mx,cur+d));a[id]=nv;const el=document.getElementById('nv');if(el)el.textContent=nv;}
let rd=null;function rdp(e,to,qId){e.preventDefault();if(rd===null||rd===to)return;const arr=[...a[qId]];const[it]=arr.splice(rd,1);arr.splice(to,0,it);a[qId]=arr;rd=null;r();}
function rmv(qId,i,dir){const arr=[...a[qId]];const ni=i+dir;if(ni<0||ni>=arr.length)return;const tmp=arr[i];arr[i]=arr[ni];arr[ni]=tmp;a[qId]=arr;r();}
document.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){const nb=document.querySelector('.nn');if(nb)nb.click();}});
r();
</script></body></html>
